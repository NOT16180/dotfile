# BACKGROUND
background {
    monitor =
    path = /home/not/Pictures/not.png
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.05        # Smaller for square appearance
    dots_spacing = 0.5       # Adjusted spacing
    dots_center = true
    outer_color = rgb(235, 219, 178)
    inner_color = rgba(40, 40, 40, 0.6)
    font_color = rgb(235, 219, 178)
    fade_on_empty = false
    rounding = 0
    check_color = rgb(152, 151, 26)
    placeholder_text = <i><span foreground="##a89984">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 22
    font_family = Terminus
    position = 0, 300
    halign = center
    valign = center
}

# TIME
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 150
    font_family = Terminus
    position = 0, 100
    halign = center
    valign = center
}

# PROFILE PICTURE
image {
    monitor =
    path = /home/not/Pictures/notpic.jpg
    size = 100
	border_radius = 0
    border_size = 2 
    border_color = $foreground
    position = 0, -100
    halign = center
    valign = center
}

# BATTERY
label {
    monitor =
    text = cmd[update:30000] echo " $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(242, 243, 244, 0.7)
    font_size = 18
    font_family = Terminus
    position = -50, 350
    halign = right
    valign = center
}

# UPTIME
label {
    monitor =
    text = cmd[update:60000] echo "Uptime: $(uptime -p | sed 's/up //')"
    color = rgba(242, 243, 244, 0.5)
    font_size = 12
    font_family = Terminus
    position = 0, -400
    halign = center
    valign = center
}
